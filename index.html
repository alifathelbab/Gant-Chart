<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel Forms Delivery Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c26;
    --surface2: #1e2330;
    --border: #2a3045;
    --border2: #354060;
    --text: #e8eaf0;
    --text2: #8892a8;
    --text3: #525d78;
    --form1: #4f8ef7;
    --form2: #2ecb8a;
    --form3: #f77c4f;
    --accent: #4f8ef7;
    --radius: 6px;
    --radius-lg: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 24px;
  }
  .header {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .subtitle { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 4px; }
  .progress-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; width: 220px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s; }
  .date-control {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 7px 12px;
  }
  .date-control label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  .date-control input[type=date] { background: transparent; border: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; cursor: pointer; }
  .date-control input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .scard { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .scard-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .scard-val { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .scard-val.small { font-size: 13px; font-weight: 500; padding-top: 4px; }

  .legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; }

  .table-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-size: 10px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px;
    font-family: 'DM Mono', monospace; padding: 10px 12px;
    text-align: left; border-bottom: 0.5px solid var(--border);
    background: var(--bg);
  }
  td { padding: 7px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }

  .form-header td {
    background: var(--bg); padding: 10px 12px 5px;
    border-bottom: 0.5px solid var(--border);
  }
  .form-name { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; font-family: 'DM Mono', monospace; }

  .phase-tag {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 4px; font-family: 'DM Mono', monospace; white-space: nowrap;
  }
  .task-list { font-size: 11px; color: var(--text2); line-height: 1.8; }
  .task-item { display: flex; align-items: center; gap: 6px; }
  .task-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }

  .date-val { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .days-input {
    width: 42px; background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 11px; padding: 3px 5px; text-align: center; outline: none;
    transition: border-color 0.15s;
  }
  .days-input:focus { border-color: var(--accent); }

  .bar-cell { padding: 7px 12px; min-width: 120px; }
  .bar-track { position: relative; height: 14px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { position: absolute; height: 100%; border-radius: 4px; transition: left 0.3s, width 0.3s; }

  .status-select {
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 3px 6px; border-radius: 4px;
    border: 0.5px solid var(--border2);
    background: var(--surface2); color: var(--text2);
    cursor: pointer; outline: none; width: 100%;
  }
  .status-select.done       { background: #0d3a22; color: #4ecb8a; border-color: #1a6040; }
  .status-select.inprogress { background: #1a3a5c; color: #7ab4f5; border-color: #2a5a9c; }
  .status-select.onhold     { background: #3a2a0d; color: #f5b84e; border-color: #6a4a1a; }
  .status-select.blocked    { background: #3a0d0d; color: #f57070; border-color: #6a1a1a; }

  .footer { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 500;
    padding: 8px 16px; border-radius: var(--radius);
    border: 0.5px solid var(--border2); background: var(--surface);
    color: var(--text2); cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #6fa3f9; }

  @media (max-width: 700px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    body { padding: 12px; }
    .col-dates { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">Steel Forms Delivery Plan</div>
    <div class="subtitle">El Fateh Industries &amp; Steel Constructions</div>
    <div class="progress-wrap"><div class="progress-fill" id="overallFill" style="width:0%"></div></div>
  </div>
  <div class="date-control">
    <label>Start</label>
    <input type="date" id="startDate">
  </div>
</div>

<div class="summary" id="summaryCards"></div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--form1)"></div>Form 1</div>
  <div class="leg"><div class="leg-dot" style="background:var(--form2)"></div>Form 2</div>
  <div class="leg"><div class="leg-dot" style="background:var(--form3)"></div>Form 3</div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:110px;">Phase</th>
        <th style="width:170px;">Tasks</th>
        <th class="col-dates" style="width:82px;">Start</th>
        <th class="col-dates" style="width:82px;">End</th>
        <th style="width:52px;">Days</th>
        <th>Timeline</th>
        <th style="width:108px;">Status</th>
      </tr>
    </thead>
    <tbody id="ganttBody"></tbody>
  </table>
</div>

<div class="footer">
  <button class="btn primary" onclick="exportCSV()">Export CSV</button>
  <button class="btn" onclick="resetAll()">Reset statuses</button>
</div>

<script>
const PHASE_COLORS = {
  'Design':          { bg:'#1a2a4a', text:'#7ab4f5' },
  'Preparation':     { bg:'#1a3a2a', text:'#4ecb8a' },
  'Fabrication':     { bg:'#3a1a2a', text:'#f57ab4' },
  'Welding':         { bg:'#2a1a3a', text:'#b47af5' },
  'QC & Inspection': { bg:'#1a3a3a', text:'#4ecbcb' },
  'Machining':       { bg:'#3a2a1a', text:'#f5b84e' },
  'Painting':        { bg:'#3a1a1a', text:'#f57070' },
  'Assemblying':     { bg:'#2a3a1a', text:'#b4f570' },
};

const PHASES = [
  { name: 'Design',          days: 31, tasks: ['Outer Form', 'Inner Form', 'Chasis'],                                         defaultStatus: 'Done'        },
  { name: 'Preparation',     days: 14, tasks: ['Cutting Sheet metals', 'Cutting Plates', 'Cutting Drilling Work', 'Cutting Accessories'], defaultStatus: 'In progress' },
  { name: 'Fabrication',     days:  7, tasks: ['Inner Form', 'Outer Form', 'Chasis'],                                         defaultStatus: 'Not started' },
  { name: 'Welding',         days:  3, tasks: ['Inner Form', 'Outer Form', 'Chasis'],                                         defaultStatus: 'Not started' },
  { name: 'QC & Inspection', days:  4, tasks: ['Inner Form', 'Outer Form', 'Chasis'],                                         defaultStatus: 'Not started' },
  { name: 'Machining',       days:  3, tasks: ['20ml plates', 'Accessories & fittings', 'Threaded parts'],                    defaultStatus: 'Not started' },
  { name: 'Painting',        days:  3, tasks: ['Sand blasting', 'Primer coat', 'Finish coat'],                                defaultStatus: 'Not started' },
  { name: 'Assemblying',     days:  4, tasks: ['Inner with Outer & Chasis', 'Pistons fit', 'Final product check'],            defaultStatus: 'Not started' },
];

const FORMS = [
  { name: 'Form 1', color: '#4f8ef7', offset:  0 },
  { name: 'Form 2', color: '#2ecb8a', offset: 14 },
  { name: 'Form 3', color: '#f77c4f', offset: 28 },
];

const STATUSES = ['Not started', 'In progress', 'Done', 'On hold', 'Blocked'];
const STATUS_CLASS = { 'Not started':'', 'In progress':'inprogress', 'Done':'done', 'On hold':'onhold', 'Blocked':'blocked' };

let startDate = new Date('2026-03-01');
startDate.setHours(0,0,0,0);

let state = {};
FORMS.forEach(f => PHASES.forEach(p => {
  state[f.name + p.name] = { days: p.days, status: f.name === 'Form 1' ? p.defaultStatus : 'Not started' };
}));

function addDays(d, n) { let r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmt(d) { return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' }); }

function computeRows() {
  let rows = [];
  FORMS.forEach(f => {
    let cursor = addDays(startDate, f.offset);
    PHASES.forEach(p => {
      let d = state[f.name + p.name].days;
      let end = addDays(cursor, d - 1);
      rows.push({ form: f, phase: p, start: new Date(cursor), end: new Date(end), days: d, status: state[f.name + p.name].status });
      cursor = addDays(cursor, d);
    });
  });
  return rows;
}

function render() {
  const rows = computeRows();
  const minDate = startDate;
  const maxDate = rows.reduce((m, r) => r.end > m ? r.end : m, startDate);
  const span = Math.max(1, (maxDate - minDate) / 864e5);
  const tbody = document.getElementById('ganttBody');
  tbody.innerHTML = '';
  let lastForm = '';

  rows.forEach(row => {
    const k = row.form.name + row.phase.name;
    if (row.form.name !== lastForm) {
      lastForm = row.form.name;
      const htr = document.createElement('tr');
      htr.className = 'form-header';
      htr.innerHTML = `<td colspan="7"><span class="form-name" style="color:${row.form.color}">${row.form.name}</span></td>`;
      tbody.appendChild(htr);
    }

    const leftPct = ((row.start - minDate) / 864e5 / span * 100).toFixed(1);
    const widthPct = Math.max(1.5, (row.days / span * 100)).toFixed(1);
    const sc = STATUS_CLASS[row.status] || '';
    const pc = PHASE_COLORS[row.phase.name] || { bg:'#1e2330', text:'#8892a8' };
    const taskHtml = row.phase.tasks.map(t => `<div class="task-item"><div class="task-dot"></div>${t}</div>`).join('');

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="phase-tag" style="background:${pc.bg};color:${pc.text}">${row.phase.name}</span></td>
      <td><div class="task-list">${taskHtml}</div></td>
      <td class="col-dates date-val">${fmt(row.start)}</td>
      <td class="col-dates date-val">${fmt(row.end)}</td>
      <td><input class="days-input" type="number" min="1" max="90" value="${row.days}" data-key="${k}"></td>
      <td class="bar-cell">
        <div class="bar-track">
          <div class="bar-fill" style="left:${leftPct}%;width:${widthPct}%;background:${row.form.color};opacity:0.8;"></div>
        </div>
      </td>
      <td>
        <select class="status-select ${sc}" data-key="${k}">
          ${STATUSES.map(s => `<option value="${s}" ${s === row.status ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </td>`;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.days-input').forEach(inp => {
    inp.addEventListener('change', function() {
      state[this.dataset.key].days = Math.max(1, parseInt(this.value) || 1);
      render();
    });
  });
  tbody.querySelectorAll('.status-select').forEach(sel => {
    sel.addEventListener('change', function() {
      state[this.dataset.key].status = this.value;
      this.className = 'status-select ' + (STATUS_CLASS[this.value] || '');
      renderSummary(rows, maxDate);
    });
  });

  renderSummary(rows, maxDate);
}

function renderSummary(rows, maxDate) {
  const allVals = Object.values(state);
  const total = allVals.length;
  const complete = allVals.filter(s => s.status === 'Done').length;
  const inprog = allVals.filter(s => s.status === 'In progress').length;
  const totalDays = Math.round((maxDate - startDate) / 864e5);
  const pct = Math.round(complete / total * 100);
  document.getElementById('summaryCards').innerHTML = `
    <div class="scard"><div class="scard-label">Total duration</div><div class="scard-val">${totalDays}d</div></div>
    <div class="scard"><div class="scard-label">Phases complete</div><div class="scard-val">${complete}/${total}</div></div>
    <div class="scard"><div class="scard-label">In progress</div><div class="scard-val">${inprog}</div></div>
    <div class="scard"><div class="scard-label">Est. completion</div><div class="scard-val small">${maxDate.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}</div></div>`;
  document.getElementById('overallFill').style.width = pct + '%';
}

function exportCSV() {
  const rows = computeRows();
  let csv = ['Form,Phase,Tasks,Start,End,Days,Status'];
  rows.forEach(r => {
    csv.push(`"${r.form.name}","${r.phase.name}","${r.phase.tasks.join(' | ')}","${fmt(r.start)}","${fmt(r.end)}",${r.days},"${r.status}"`);
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv.join('\n'));
  a.download = 'steel_forms_delivery_plan.csv';
  a.click();
}

function resetAll() {
  FORMS.forEach(f => PHASES.forEach(p => {
    state[f.name + p.name].status = f.name === 'Form 1' ? p.defaultStatus : 'Not started';
  }));
  render();
}

const sd = document.getElementById('startDate');
sd.value = '2026-03-01';
sd.addEventListener('change', function() {
  const parts = this.value.split('-');
  startDate = new Date(parts[0], parts[1]-1, parts[2]);
  render();
});

render();
</script>
</body>
</html>
